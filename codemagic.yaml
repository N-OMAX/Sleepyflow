workflows:
  ios-native-workflow:
    name: Sleepyflow iOS App
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Build iOS App
        script: xcodebuild build -project Sleepyflow.xcodeproj -scheme Sleepyflow -sdk iphoneos -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CONFIGURATION_BUILD_DIR=$(PWD)/build/Release-iphoneos
      - name: Package to IPA
        script: |
          mkdir -p Payload
          cp -R build/Release-iphoneos/Sleepyflow.app Payload/
          zip -qr Sleepyflow-unsigned.ipa Payload
    artifacts:
      - Sleepyflow-unsigned.ipa
