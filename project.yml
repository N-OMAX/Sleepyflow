name: Sleepyflow
options:
  bundleIdPrefix: com.joshuapawlowski
  deploymentTarget:
    iOS: 16.0
targets:
  Sleepyflow:
    type: application
    platform: iOS
    sources: [Sleepyflow]
    info:
      path: Sleepyflow/Info.plist
      properties:
        UILaunchScreen: {}
        NSAlarmKitUsageDescription: "Sleepyflow braucht diese Berechtigung, um deinen Weckalarm zuverlässig auszulösen — auch bei stummgeschaltetem iPhone oder aktivem Fokus."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
    entitlements:
      path: Sleepyflow/Sleepyflow.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joshuapawlowski.sleepyflow
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
